services:
  database:
    image: postgres:17-alpine
    env_file: .env
    volumes:
      - phase3_postgres:/var/lib/postgresql/data
      - ./database/schemas/threats.sql:/docker-entrypoint-initdb.d/01-threats.sql:ro
      - ./database/schemas/vulnerabilities.sql:/docker-entrypoint-initdb.d/02-vulnerabilities.sql:ro
      - ./database/schemas/indicators.sql:/docker-entrypoint-initdb.d/03-indicators.sql:ro
      - ./database/schemas/malware.sql:/docker-entrypoint-initdb.d/04-malware.sql:ro
      - ./database/schemas/activity_logs.sql:/docker-entrypoint-initdb.d/05-logs.sql:ro
      - ./database/seed_data/sample_threats.sql:/docker-entrypoint-initdb.d/06-threat-data.sql:ro
      - ./database/seed_data/sample_vulnerabilities.sql:/docker-entrypoint-initdb.d/07-vulnerability-data.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    security_opt: ["no-new-privileges:true"]
  backend:
    build: ./backend
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@database:5432/${POSTGRES_DB}
    ports: ["8001:8001"]
    depends_on:
      database: {condition: service_healthy}
    security_opt: ["no-new-privileges:true"]
  frontend:
    build: ./frontend
    ports: ["5174:80"]
    depends_on: [backend]
    security_opt: ["no-new-privileges:true"]
volumes:
  phase3_postgres:
