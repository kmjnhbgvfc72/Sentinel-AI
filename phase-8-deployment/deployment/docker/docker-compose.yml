name: ai-soc
services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: soc
      POSTGRES_USER: soc
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
    secrets: [postgres_password]
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ../../database/production_schema.sql:/docker-entrypoint-initdb.d/001-schema.sql:ro
    healthcheck: {test: ["CMD-SHELL", "pg_isready -U soc -d soc"], interval: 10s, timeout: 5s, retries: 5}
    restart: unless-stopped
  redis:
    image: redis:7.4-alpine
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD}"]
    volumes: ["redis-data:/data"]
    healthcheck: {test: ["CMD-SHELL", "redis-cli -a $$REDIS_PASSWORD ping | grep PONG"], interval: 10s, timeout: 5s, retries: 5}
    environment: {REDIS_PASSWORD: "${REDIS_PASSWORD}"}
    restart: unless-stopped
  backend:
    build: {context: ../.., dockerfile: deployment/docker/Dockerfile.backend}
    env_file: ../../.env
    environment:
      DATABASE_URL: postgresql+psycopg://soc:${POSTGRES_PASSWORD}@postgres:5432/soc
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
    depends_on:
      postgres: {condition: service_healthy}
      redis: {condition: service_healthy}
    read_only: true
    tmpfs: [/tmp]
    security_opt: [no-new-privileges:true]
    cap_drop: [ALL]
    restart: unless-stopped
  frontend:
    build: {context: ../.., dockerfile: deployment/docker/Dockerfile.frontend}
    ports: ["8080:8080"]
    depends_on: [backend]
    read_only: true
    tmpfs: [/var/cache/nginx, /var/run]
    security_opt: [no-new-privileges:true]
    cap_drop: [ALL]
    restart: unless-stopped
  prometheus:
    image: prom/prometheus:v3.1.0
    volumes: ["../../prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro"]
    ports: ["9090:9090"]
    restart: unless-stopped
  grafana:
    image: grafana/grafana:11.4.0
    environment: {GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_PASSWORD}"}
    volumes: ["grafana-data:/var/lib/grafana", "../../grafana/provisioning:/etc/grafana/provisioning:ro"]
    ports: ["3001:3000"]
    restart: unless-stopped
secrets:
  postgres_password: {file: ../../secrets/postgres_password.txt}
volumes: {postgres-data: {}, redis-data: {}, grafana-data: {}}

