<svg viewBox="0 0 1200 340" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="apBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a14"/>
      <stop offset="100%" stop-color="#161233"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="340" fill="url(#apBg)"/>

  <!-- graph edges -->
  <g stroke="#2c2f55" stroke-width="2" fill="none">
    <path id="edge1" d="M120,170 L340,80"/>
    <path id="edge2" d="M120,170 L340,260"/>
    <path d="M340,80 L340,260" opacity="0.4"/>
    <path id="edge3" d="M340,80 L600,60"/>
    <path id="edge4" d="M340,260 L600,280"/>
    <path d="M600,60 L600,280" opacity="0.4"/>
    <path id="edge5" d="M600,60 L860,170"/>
    <path id="edge6" d="M600,280 L860,170"/>
    <path id="edge7" d="M860,170 L1080,170"/>
  </g>

  <!-- nodes -->
  <g font-family="Fira Code, monospace" font-size="13" fill="#c9d4ef">
    <circle cx="120" cy="170" r="20" fill="#1e1e2f" stroke="#00b4ff" stroke-width="2"/>
    <text x="120" y="210" text-anchor="middle">Entry Point</text>

    <circle cx="340" cy="80" r="18" fill="#1e1e2f" stroke="#00b4ff" stroke-width="2"/>
    <text x="340" y="55" text-anchor="middle">Web Server</text>

    <circle cx="340" cy="260" r="18" fill="#1e1e2f" stroke="#00b4ff" stroke-width="2"/>
    <text x="340" y="298" text-anchor="middle">User Endpoint</text>

    <circle cx="600" cy="60" r="18" fill="#1e1e2f" stroke="#ffbd2e" stroke-width="2"/>
    <text x="600" y="35" text-anchor="middle">Vuln: CVE-2024-x</text>

    <circle cx="600" cy="280" r="18" fill="#1e1e2f" stroke="#ffbd2e" stroke-width="2"/>
    <text x="600" y="315" text-anchor="middle">Weak Credential</text>

    <circle cx="860" cy="170" r="20" fill="#1e1e2f" stroke="#ff003c" stroke-width="2"/>
    <text x="860" y="210" text-anchor="middle">Domain Admin</text>

    <circle cx="1080" cy="170" r="22" fill="#1e1e2f" stroke="#ff003c" stroke-width="3"/>
    <text x="1080" y="210" text-anchor="middle" font-weight="700" fill="#ff003c">CRITICAL ASSET</text>
  </g>

  <!-- traveling attacker dot along predicted path -->
  <circle r="7" fill="#ff003c">
    <animateMotion dur="4s" repeatCount="indefinite"
      keyPoints="0;0.14;0.28;0.42;0.56;0.7;0.84;1"
      keyTimes="0;0.14;0.28;0.42;0.56;0.7;0.84;1"
      calcMode="linear"
      path="M120,170 L340,80 L340,260 L600,280 L600,60 L860,170 L1080,170"/>
    <animate attributeName="r" values="5;9;5" dur="0.8s" repeatCount="indefinite"/>
  </circle>

  <!-- pulsing critical asset -->
  <circle cx="1080" cy="170" r="22" fill="none" stroke="#ff003c" stroke-width="2" opacity="0.7">
    <animate attributeName="r" values="22;42;22" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.7;0;0.7" dur="2s" repeatCount="indefinite"/>
  </circle>

  <text x="600" y="330" text-anchor="middle" font-family="Fira Code, monospace" font-size="14" fill="#7d8fb3">
    PREDICTED ATTACK PATH: Entry → Web Server → Weak Credential → Domain Admin → Critical Asset
  </text>
</svg>
