<svg viewBox="0 0 1200 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a14"/>
      <stop offset="50%" stop-color="#14142b"/>
      <stop offset="100%" stop-color="#0a0a14"/>
    </linearGradient>
    <linearGradient id="scanGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00ff9c" stop-opacity="0"/>
      <stop offset="50%" stop-color="#00ff9c" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#00ff9c" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="nodeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00ff9c" stop-opacity="1"/>
      <stop offset="100%" stop-color="#00ff9c" stop-opacity="0"/>
    </radialGradient>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="280" fill="url(#bgGrad)"/>

  <!-- circuit grid -->
  <g stroke="#1f2a44" stroke-width="1" opacity="0.6">
    <path d="M0,40 H1200 M0,80 H1200 M0,120 H1200 M0,160 H1200 M0,200 H1200 M0,240 H1200"/>
    <path d="M60,0 V280 M180,0 V280 M300,0 V280 M420,0 V280 M540,0 V280 M660,0 V280 M780,0 V280 M900,0 V280 M1020,0 V280 M1140,0 V280"/>
  </g>

  <!-- moving scan line -->
  <rect x="0" y="0" width="1200" height="70" fill="url(#scanGrad)">
    <animateTransform attributeName="transform" type="translate" values="0,-70; 0,280; 0,-70" dur="6s" repeatCount="indefinite"/>
  </rect>

  <!-- pulsing threat nodes -->
  <g>
    <circle cx="120" cy="60" r="4" fill="#ff003c">
      <animate attributeName="r" values="3;9;3" dur="2.2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;0.2;1" dur="2.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1080" cy="220" r="4" fill="#ff003c">
      <animate attributeName="r" values="3;9;3" dur="2.6s" begin="0.6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;0.2;1" dur="2.6s" begin="0.6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="300" cy="220" r="3" fill="#00b4ff">
      <animate attributeName="r" values="2;7;2" dur="1.8s" begin="0.3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="950" cy="55" r="3" fill="#00b4ff">
      <animate attributeName="r" values="2;7;2" dur="2s" begin="1s" repeatCount="indefinite"/>
    </circle>
    <circle cx="600" cy="250" r="3" fill="#00ff9c">
      <animate attributeName="r" values="2;8;2" dur="2.4s" begin="0.2s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- shield core -->
  <g transform="translate(600,140)" filter="url(#softGlow)">
    <circle r="46" fill="url(#nodeGlow)" opacity="0.5">
      <animate attributeName="r" values="40;54;40" dur="3s" repeatCount="indefinite"/>
    </circle>
    <path d="M0,-26 L22,-16 V6 C22,22 10,32 0,36 C-10,32 -22,22 -22,6 V-16 Z"
          fill="none" stroke="#00ff9c" stroke-width="2.5"/>
    <path d="M-9,0 L-2,8 L11,-9" fill="none" stroke="#00ff9c" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <animate attributeName="stroke-dasharray" values="0,40; 40,40" dur="1.4s" begin="0.5s" fill="freeze"/>
    </path>
  </g>

  <!-- title -->
  <text x="600" y="90" text-anchor="middle" font-family="Fira Code, monospace" font-weight="700"
        font-size="34" fill="#00ff9c" filter="url(#softGlow)">
    AI CYBER THREAT INTELLIGENCE SYSTEM
    <animate attributeName="opacity" values="0.75;1;0.75" dur="2.5s" repeatCount="indefinite"/>
  </text>
  <text x="600" y="230" text-anchor="middle" font-family="Fira Code, monospace" font-size="16" fill="#7d8fb3">
    AUTONOMOUS SOC · REAL-TIME DETECTION · PREDICTIVE DEFENSE
  </text>

  <!-- traveling packet along top edge -->
  <circle r="4" fill="#00ff9c">
    <animateMotion dur="4s" repeatCount="indefinite"
      path="M0,10 L1200,10" />
  </circle>
  <circle r="4" fill="#ff003c">
    <animateMotion dur="5s" repeatCount="indefinite"
      path="M1200,270 L0,270" />
  </circle>
</svg>
