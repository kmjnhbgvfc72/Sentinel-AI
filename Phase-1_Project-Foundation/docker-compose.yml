services:
  database:
    image: postgres:17-alpine
    restart: unless-stopped
    env_file: .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schemas/initial_schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./database/seed_data/sample_data.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    security_opt:
      - no-new-privileges:true

  backend:
    build: ./backend
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://cti_user:cti_dev_password@database:5432/cti_db
    ports:
      - "8000:8000"
    depends_on:
      database:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true

volumes:
  postgres_data:
