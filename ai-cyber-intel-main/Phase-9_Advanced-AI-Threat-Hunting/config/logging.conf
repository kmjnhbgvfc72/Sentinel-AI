[loggers]
keys=root,phase9
[handlers]
keys=console
[formatters]
keys=jsonlike
[logger_root]
level=INFO
handlers=console
[logger_phase9]
level=INFO
handlers=console
qualname=phase9
propagate=0
[handler_console]
class=StreamHandler
level=INFO
formatter=jsonlike
args=(sys.stdout,)
[formatter_jsonlike]
format={"time":"%(asctime)s","level":"%(levelname)s","logger":"%(name)s","message":"%(message)s"}
