services:
  database:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-threatintel}
      POSTGRES_USER: ${POSTGRES_USER:-threatintel}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    volumes:
      - threatintel_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./database/seed_data.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-threatintel} -d ${POSTGRES_DB:-threatintel}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
  backend:
    build: ./backend
    env_file: .env
    ports: ["8005:8005"]
    depends_on:
      database: {condition: service_healthy}
    extra_hosts: ["host.docker.internal:host-gateway"]
    read_only: true
    tmpfs: ["/tmp"]
    security_opt: ["no-new-privileges:true"]
    restart: unless-stopped
  frontend:
    build:
      context: ./frontend
      args: {VITE_API_URL: "${VITE_API_URL:-http://localhost:8005/api}"}
    ports: ["5177:80"]
    depends_on: [backend]
    read_only: true
    tmpfs: ["/var/cache/nginx", "/var/run"]
    security_opt: ["no-new-privileges:true"]
    restart: unless-stopped
volumes:
  threatintel_data:
