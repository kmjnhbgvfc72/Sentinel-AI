#cloud-config
package_update: true
package_upgrade: true
packages: [ca-certificates, curl, fail2ban, unattended-upgrades]
users:
  - name: socops
    groups: [sudo]
    shell: /bin/bash
    sudo: ["ALL=(ALL) NOPASSWD:ALL"]
    lock_passwd: true
    ssh_authorized_keys: ["REPLACE_WITH_OPERATIONS_PUBLIC_KEY"]
ssh_pwauth: false
disable_root: true
write_files:
  - path: /etc/sysctl.d/99-ai-soc.conf
    permissions: "0644"
    content: |
      net.ipv4.conf.all.rp_filter=1
      net.ipv4.conf.default.rp_filter=1
      kernel.kptr_restrict=2
      kernel.dmesg_restrict=1
runcmd:
  - [sysctl, --system]
  - [systemctl, enable, --now, fail2ban]

