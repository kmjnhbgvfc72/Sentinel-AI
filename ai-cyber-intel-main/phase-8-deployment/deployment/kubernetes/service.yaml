apiVersion: v1
kind: Service
metadata: {name: ai-soc-api, namespace: ai-soc, labels: {app: ai-soc-api}}
spec: {type: ClusterIP, selector: {app: ai-soc-api}, ports: [{name: http, port: 80, targetPort: http}]}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata: {name: ai-soc-api, namespace: ai-soc}
spec:
  podSelector: {matchLabels: {app: ai-soc-api}}
  policyTypes: [Ingress, Egress]
  ingress: [{from: [{namespaceSelector: {matchLabels: {kubernetes.io/metadata.name: ingress-nginx}}}], ports: [{protocol: TCP, port: 8000}]}]
  egress:
    - to: [{namespaceSelector: {matchLabels: {kubernetes.io/metadata.name: ai-soc}}}]
      ports: [{protocol: TCP, port: 5432}, {protocol: TCP, port: 6379}]
    - to: [{namespaceSelector: {}}]
      ports: [{protocol: UDP, port: 53}, {protocol: TCP, port: 443}]

