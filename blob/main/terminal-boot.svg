<svg viewBox="0 0 1200 340" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="termBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#05070a"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="340" rx="14" fill="url(#termBg)" stroke="#00ff9c" stroke-width="1.5" opacity="0.95"/>

  <!-- title bar -->
  <rect x="0" y="0" width="1200" height="34" rx="14" fill="#151b23"/>
  <rect x="0" y="20" width="1200" height="14" fill="#151b23"/>
  <circle cx="24" cy="17" r="6" fill="#ff5f56"/>
  <circle cx="46" cy="17" r="6" fill="#ffbd2e"/>
  <circle cx="68" cy="17" r="6" fill="#27c93f"/>
  <text x="600" y="22" text-anchor="middle" font-family="Fira Code, monospace" font-size="13" fill="#7d8fb3">soc-core@boot: ~</text>

  <g font-family="Fira Code, monospace" font-size="16" fill="#00ff9c">
    <text x="26" y="66" opacity="0">
      &gt; initializing threat intelligence core...
      <animate attributeName="opacity" begin="0.2s" dur="0.4s" fill="freeze" values="0;1"/>
    </text>
    <text x="26" y="94" opacity="0" fill="#00b4ff">
      &gt; loading AI detection models [OK]
      <animate attributeName="opacity" begin="1.0s" dur="0.4s" fill="freeze" values="0;1"/>
    </text>
    <text x="26" y="122" opacity="0" fill="#00b4ff">
      &gt; connecting threat feeds... 214 sources linked
      <animate attributeName="opacity" begin="1.8s" dur="0.4s" fill="freeze" values="0;1"/>
    </text>
    <text x="26" y="150" opacity="0" fill="#ffbd2e">
      &gt; warning: 3 unpatched CVEs found on subnet 10.0.4.0/24
      <animate attributeName="opacity" begin="2.6s" dur="0.4s" fill="freeze" values="0;1"/>
    </text>
    <text x="26" y="178" opacity="0" fill="#00ff9c">
      &gt; starting attack path prediction engine [OK]
      <animate attributeName="opacity" begin="3.4s" dur="0.4s" fill="freeze" values="0;1"/>
    </text>
    <text x="26" y="206" opacity="0" fill="#00ff9c">
      &gt; arming SOAR auto-response playbooks [OK]
      <animate attributeName="opacity" begin="4.2s" dur="0.4s" fill="freeze" values="0;1"/>
    </text>
    <text x="26" y="234" opacity="0" fill="#ff003c">
      &gt; intrusion attempt detected: 185.62.x.x → blocked in 42ms
      <animate attributeName="opacity" begin="5.0s" dur="0.4s" fill="freeze" values="0;1"/>
    </text>
    <text x="26" y="262" opacity="0" fill="#00ff9c">
      &gt; SOC dashboard live at :3000
      <animate attributeName="opacity" begin="5.8s" dur="0.4s" fill="freeze" values="0;1"/>
    </text>
    <text x="26" y="296" opacity="0" font-weight="700" fill="#00ff9c">
      &gt; SYSTEM ONLINE — ALL MODULES ACTIVE
      <animate attributeName="opacity" begin="6.6s" dur="0.5s" fill="freeze" values="0;1"/>
    </text>
  </g>

  <!-- blinking cursor -->
  <rect x="26" y="304" width="11" height="18" fill="#00ff9c" opacity="0">
    <animate attributeName="opacity" begin="7.1s" dur="0.9s" repeatCount="indefinite" values="1;0;1"/>
  </rect>

  <!-- restart the whole sequence -->
  <animate attributeName="opacity" values="1;1" dur="9s" repeatCount="indefinite"/>
</svg>
