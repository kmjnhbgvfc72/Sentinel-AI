<svg viewBox="0 0 1200 340" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="radarBg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0c1a14"/>
      <stop offset="100%" stop-color="#050a08"/>
    </radialGradient>
    <linearGradient id="sweepGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00ff9c" stop-opacity="0"/>
      <stop offset="100%" stop-color="#00ff9c" stop-opacity="0.55"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="340" fill="url(#radarBg)"/>

  <g transform="translate(600,170)">
    <!-- range rings -->
    <circle r="140" fill="none" stroke="#0f3d2c" stroke-width="1.5"/>
    <circle r="105" fill="none" stroke="#0f3d2c" stroke-width="1.5"/>
    <circle r="70" fill="none" stroke="#0f3d2c" stroke-width="1.5"/>
    <circle r="35" fill="none" stroke="#0f3d2c" stroke-width="1.5"/>
    <line x1="-140" y1="0" x2="140" y2="0" stroke="#0f3d2c" stroke-width="1.5"/>
    <line x1="0" y1="-140" x2="0" y2="140" stroke="#0f3d2c" stroke-width="1.5"/>

    <!-- rotating sweep -->
    <g>
      <path d="M0,0 L140,0 A140,140 0 0,1 99,99 Z" fill="url(#sweepGrad)"/>
      <line x1="0" y1="0" x2="140" y2="0" stroke="#00ff9c" stroke-width="2"/>
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="4s" repeatCount="indefinite"/>
    </g>

    <!-- threat blips -->
    <circle cx="70" cy="-40" r="5" fill="#ff003c">
      <animate attributeName="opacity" values="0;1;0" dur="4s" begin="0.4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="-95" cy="30" r="5" fill="#ff003c">
      <animate attributeName="opacity" values="0;1;0" dur="4s" begin="1.9s" repeatCount="indefinite"/>
    </circle>
    <circle cx="40" cy="100" r="4" fill="#ffbd2e">
      <animate attributeName="opacity" values="0;1;0" dur="4s" begin="2.7s" repeatCount="indefinite"/>
    </circle>
    <circle cx="-55" cy="-95" r="4" fill="#00b4ff">
      <animate attributeName="opacity" values="0;1;0" dur="4s" begin="3.3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="115" cy="55" r="4" fill="#ff003c">
      <animate attributeName="opacity" values="0;1;0" dur="4s" begin="0.9s" repeatCount="indefinite"/>
    </circle>

    <!-- center node -->
    <circle r="6" fill="#00ff9c"/>
  </g>

  <text x="600" y="320" text-anchor="middle" font-family="Fira Code, monospace" font-size="15" fill="#00ff9c">
    SCANNING NETWORK — THREAT NODES HIGHLIGHTED IN RED
  </text>

  <!-- live threat count ticker -->
  <text x="1050" y="40" text-anchor="end" font-family="Fira Code, monospace" font-size="14" fill="#ff003c">
    THREATS: <tspan id="cnt">0</tspan>
    <animate attributeName="opacity" values="1;0.5;1" dur="1.2s" repeatCount="indefinite"/>
  </text>
</svg>
