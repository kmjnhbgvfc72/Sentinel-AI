server { listen 8080; server_name _; root /usr/share/nginx/html; index index.html;
  add_header X-Frame-Options DENY always; add_header X-Content-Type-Options nosniff always; add_header Referrer-Policy no-referrer always;
  location / { try_files $uri /index.html; }
  location /api/ { proxy_pass http://backend:8000; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
}

